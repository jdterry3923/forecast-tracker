    const ml = latest.month_labels || [];
    const ds = ml.slice(0, 6).map((lbl, mi) => ({
      label: lbl, data: S.map(s => (s.properties[prop]||{}).revenue ? s.properties[prop].revenue[mi] : 0),
      borderColor: colors[mi % colors.length], borderWidth: 2, tension: 0.3, pointRadius: 3, fill: false
    }));
    c1 = new Chart(ctx1, { type: 'line', data: { labels, datasets: ds }, options: { responsive: true, plugins: { legend: { labels: { color: '#E2E8F0' } } }, scales: { x: { ticks: { color: '#8899B0' } }, y: { ticks: { color: '#8899B0', callback: v => fmt(v) } } } } });
  } else {
    document.getElementById('chart1Title').textContent = 'Forecast Shape (by Snapshot)';
    const ml = latest.month_labels || [];
    const ds = S.map((s, si) => ({
      label: s.date, data: (s.properties[prop]||{}).revenue || [],
      borderColor: colors[si % colors.length], borderWidth: si === S.length-1 ? 3 : 1.5,
      borderDash: si === S.length-1 ? [] : [4,4], tension: 0.3, pointRadius: si === S.length-1 ? 3 : 0, fill: false
    }));
    c1 = new Chart(ctx1, { type: 'line', data: { labels: ml, datasets: ds }, options: { responsive: true, plugins: { legend: { labels: { color: '#E2E8F0' } } }, scales: { x: { ticks: { color: '#8899B0' } }, y: { ticks: { color: '#8899B0', callback: v => fmt(v) } } } } });
  }
  // Chart 2: R12 trend
  if (c2) c2.destroy();
  const ctx2 = document.getElementById('chart2').getContext('2d');
  c2 = new Chart(ctx2, { type: 'line', data: { labels: S.map(s => s.date), datasets: [{
    label: 'R12 Revenue', data: S.map(s => (s.properties[prop]||{}).r12_revenue || 0),
    borderColor: '#4472C4', borderWidth: 3, tension: 0.3, pointRadius: 4, fill: true,
    backgroundColor: 'rgba(68,114,196,0.15)'
  }] }, options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#8899B0' } }, y: { ticks: { color: '#8899B0', callback: v => fmt(v) } } } } });
  // Data table
  const ml = latest.month_labels || [];
  let h = '<table><tr><th>Date</th>';
  ml.forEach(m => h += `<th>${m}</th>`);
  h += '<th style="background:#0A1F38">R12</th></tr>';
  S.forEach(s => {
    const p = s.properties[prop] || {};
    h += `<tr><td>${s.date}</td>`;
    (p.revenue||[]).forEach(v => h += `<td>${fmt(v)}</td>`);
    h += `<td style="font-weight:700">${fmt(p.r12_revenue||0)}</td></tr>`;
  });
  h += '</table>';
  document.getElementById('dataTable').innerHTML = h;
}
updateAll();
</script>
</body>
</html>
